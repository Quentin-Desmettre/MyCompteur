services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compteur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définissez POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-compteur}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compteur}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      INGEST_KEY: ${INGEST_KEY:?définissez INGEST_KEY dans .env}
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-compteur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-compteur}
    depends_on:
      db:
        condition: service_healthy
    # Exposé en local pour tests/curl ; en prod, Caddy fait le reverse-proxy TLS.
    ports:
      - "8000:8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN:?définissez DOMAIN dans .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
