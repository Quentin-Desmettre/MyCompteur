services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compteur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définissez POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-compteur}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compteur}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      INGEST_KEY: ${INGEST_KEY:?définissez INGEST_KEY dans .env}
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-compteur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-compteur}
    depends_on:
      db:
        condition: service_healthy
    # Dokploy (Traefik) gère le TLS + le routage vers le port 8000 du conteneur.
    expose:
      - "8000"

volumes:
  pgdata:
